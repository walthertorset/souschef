name: Supabase Keep-Alive

on:
  schedule:
    # Kjører kl 05:00 hver dag for å holde prosjektet våkent
    - cron: '0 5 * * *'
  workflow_dispatch: # Gjør det mulig å kjøre manuelt fra GitHub Actions-fanen

jobs:
  keep-alive:
    runs-on: ubuntu-latest
    steps:
      - name: Send ping til Supabase
        run: |
          curl -X GET "${{ secrets.SUPABASE_URL }}/rest/v1/kokebok?select=*&limit=1" \
          -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
          -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}"
